name: "Error Testing Tasks"
version: "1.0"

tasks:
  success:
    name: "Always succeeds"
    runs: echo "This task succeeds"

  failure:
    name: "Always fails"
    runs: |
      echo "This task will fail"
      exit 1

  dependent:
    name: "Depends on failing task"
    runs: echo "This should be skipped"
    depends_on: [failure]